{% include base_path %}

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->

<!-- end custom head snippets -->

<!-- Custom fonts: Lora (headings) + Source Sans 3 (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Source Sans 3', sans-serif; -webkit-font-smoothing: antialiased; padding-top: 56px; }
h1, h2, h3, .author__name, .page__title { font-family: 'Lora', serif; }
.page__title { font-weight: 700; letter-spacing: -0.01em; }
.masthead { box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.masthead__menu-item--lg a { font-family: 'Lora', serif; font-weight: 600; font-size: 1.05em; }
.greedy-nav a { font-family: 'Source Sans 3', sans-serif; font-size: 0.88em; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.author__avatar img { border-radius: 50%; border: 3px solid var(--global-border-color); box-shadow: 0 2px 12px rgba(0,0,0,0.10); transition: box-shadow 0.3s ease; }
.author__avatar img:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.16); }
.author__name { font-size: 1.05em; letter-spacing: -0.01em; }
.author__bio { font-size: 0.78em; line-height: 1.6; opacity: 0.82; }
.author__urls.social-icons li { padding: 0.18em 0; font-size: 0.82em; }
.author__urls-wrapper .btn { font-size: 0.78em; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 3px; transition: all 0.2s ease; }
.page__content { font-size: 0.97em; line-height: 1.78; }
.page__content h2 { font-family: 'Lora', serif; font-weight: 600; font-size: 1.28em; margin-top: 1.8em; margin-bottom: 0.5em; }
.page__content h2:first-child { margin-top: 0.3em; }
.page__content h3 { font-family: 'Lora', serif; font-size: 1.08em; font-weight: 600; margin-top: 1.4em; }
table { font-size: 0.88em; }
table th { font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.obj-card { border-left: 3px solid #4a7c59; background: rgba(74,124,89,0.05); border-radius: 0 6px 6px 0; padding: 0.85em 1.2em; margin: 0.9em 0; }
.obj-card p { margin: 0; font-size: 0.92em; line-height: 1.65; }
.obj-card strong { color: #4a7c59; font-family: 'Source Sans 3', sans-serif; }
.page__content p { text-align: justify; }
</style>
